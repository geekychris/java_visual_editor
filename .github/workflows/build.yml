name: Build plugin

# Build the Visual Java IntelliJ plugin on every push / PR. Tag pushes
# (`v*`) additionally create a GitHub Release with the .zip attached.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write    # needed to publish releases on tag push

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK 21 / Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          # Avoid wasted CI cache on PR builds.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build plugin
        run: ./gradlew :plugin:buildPlugin --no-daemon --stacktrace

      # The plugin zip lands under plugin/build/distributions/. Surface the
      # path for the next steps so renames don't break artifact upload.
      - name: Locate plugin zip
        id: zip
        run: |
          ZIP_PATH=$(ls plugin/build/distributions/*.zip | head -n1)
          ZIP_NAME=$(basename "$ZIP_PATH")
          echo "path=$ZIP_PATH"  >> "$GITHUB_OUTPUT"
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Built $ZIP_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-java-plugin
          path: plugin/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30

      # On tag push (e.g. `git tag v1.0.0 && git push --tags`): create a
      # GitHub Release with the zip attached so users can install it via
      # "Install Plugin from Disk…" in IntelliJ.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
